name: Mobile Tests

on:
  push:
    branches: [ main ]

jobs:
  android-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Appium
        run: |
          npm install -g appium@2
          appium driver install uiautomator2@2.29.2

      - name: Instalar dependências Python
        run: |
          pip install robotframework robotframework-appiumlibrary

      - name: Baixar APK
        run: |
          mkdir -p app
          wget https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk -O app/app.apk

      - name: Rodar emulator e testes
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          profile: Nexus 6
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Aumentando estabilidade do device..."
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            echo "Checking Appium driver..."
            appium driver list --installed

            echo "Starting Appium..."
            appium server --base-path /wd/hub > appium.log 2>&1 &

            echo "Esperando Appium subir..."
            sleep 30

            echo "Running tests..."
            robot --outputdir results tests/

      - name: Upload resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: |
            results/
            appium.log